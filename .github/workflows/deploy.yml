name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: romain
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ~/apps/hono-api
            git pull origin main
            docker compose up -d --build
