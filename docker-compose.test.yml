services:
  test-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 2s
      timeout: 5s
      retries: 5

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://test:test@test-db:5432/test_db
      NODE_ENV: test
      VAST_AI_API_KEY: test-api-key
      IMAGES_STORAGE_PATH: /tmp/test-images
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npx prisma migrate deploy && npm run test:run"
